## PayOS Config
payos.client-id=${PAYOS_CLIENT_ID:xxx}
payos.api-key=${PAYOS_API_KEY:xxx}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:xxx}
payos.return-url=${PAYOS_RETURN_URL:http://localhost:8080/api/v1/payment/payos-callback}
payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:8080/api/v1/payment/payos-callback}

# RabbitMQ Config (Individual properties for better cloud compatibility)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}
# URI Fallback
spring.rabbitmq.uri=${SPRING_RABBITMQ_URI:}

# Thử lại khi lỗi (Retry Policy)
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=3000ms
spring.rabbitmq.listener.simple.retry.multiplier=2.0

# Điều phối công việc (Concurrency)
spring.rabbitmq.listener.simple.prefetch=1

# SpringDoc Swagger UI config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-query-params-equal-to-list=true
springdoc.swagger-ui.try-it-out-enabled=true
