# Redis Config
# Railway cung cấp biến REDISHOST, REDISPORT, REDISPASSWORD
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}
# Cache TTL - 1 giờ (3600000 ms)
spring.cache.redis.time-to-live=3600000
spring.cache.type=redis

# Telegram Bot Config
# Get Token from @BotFather and ChatId from @userinfobot
